<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerogram Feed</title>
    <style>
        body { font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background-color: #000000; color: #f5f5f5; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .insta-wrapper { max-width: 935px; width: 100%; padding: 30px 20px; box-sizing: border-box; }
        .insta-profile-header { display: flex; align-items: center; gap: 40px; padding-bottom: 44px; border-bottom: 1px solid #262626; margin-bottom: 20px; }
        .profile-avatar-circle { width: 110px; height: 110px; background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7); border-radius: 50%; padding: 4px; display: flex; align-items: center; justify-content: center; }
        .profile-avatar-inner { width: 100%; height: 100%; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; color: #ff8da1; }
        .profile-info-data { flex-grow: 1; display: flex; flex-direction: column; gap: 12px; }
        .profile-top-line { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .profile-top-line h1 { font-size: 1.75rem; font-weight: 300; margin: 0; color: #ffffff; }
        
        .insta-controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .control-card-box { background: #121212; border: 1px solid #262626; border-radius: 8px; padding: 20px; box-sizing: border-box; }
        .control-card-box h3 { margin-top: 0; font-size: 1rem; color: #8e8e8e; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #262626; padding-bottom: 8px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .form-group label { font-size: 0.85rem; color: #a8a8a8; font-weight: 600; }
        .form-group input, .form-group select { background: #000; border: 1px solid #363636; padding: 9px; color: white; border-radius: 4px; font-size: 0.9rem; outline: none; width: 100%; box-sizing: border-box; }
        
        .btn-insta { background-color: #0095f6; color: white; border: none; padding: 9px 16px; font-size: 0.9rem; font-weight: 600; border-radius: 4px; cursor: pointer; text-align: center; display: inline-block; text-decoration: none; }
        .btn-insta:hover { background-color: #1877f2; }
        .btn-secondary-insta { background-color: #121212; color: #fff; border: 1px solid #363636; padding: 7px 16px; font-weight: 600; border-radius: 4px; cursor: pointer; }
        .btn-secondary-insta:hover { background-color: #262626; }
        .btn-danger { background-color: #311111; color: #ff4757; border: 1px solid #521919; margin-top: 10px; width: 100%; }
        .btn-danger:hover { background-color: #311111; }

        .progress-container { display: none; margin-top: 15px; background: #262626; border-radius: 4px; overflow: hidden; position: relative; height: 20px; }
        .progress-bar-fill { background: linear-gradient(45deg, #0095f6, #00a8ff); width: 0%; height: 100%; transition: width 0.1s ease; }
        .progress-text { position: absolute; top: 0; left: 50%; transform: translateX(-50%); font-size: 0.75rem; font-weight: bold; color: #fff; line-height: 20px; }

        .insta-feed-tabs { display: flex; justify-content: center; gap: 30px; border-top: 1px solid #262626; margin-bottom: 15px; padding-top: 10px; }
        .tab-btn-insta { background: none; border: none; color: #8e8e8e; padding: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .tab-btn-insta.active { color: #ffffff; border-bottom: 2px solid #ffffff; }

        .grid-gallery-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; width: 100%; }
        .grid-item-card { display: flex; flex-direction: column; background: #121212; border: 1px solid #262626; border-radius: 4px; overflow: hidden; position: relative; }
        .grid-item-box { position: relative; aspect-ratio: 1; background-color: #0a0a0f; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .grid-item-box img, .grid-item-box video { width: 100%; height: 100%; object-fit: cover; }
        
        .close-icon { position: absolute; top: 12px; right: 12px; background: rgba(255, 71, 87, 0.95); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; font-weight: bold; cursor: pointer; z-index: 20; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
        
        .grid-item-footer { padding: 12px; background: #121212; border-top: 1px solid #262626; }
        .comments-tray { max-height: 60px; overflow-y: auto; font-size: 0.85rem; color: #c7c7c7; margin-bottom: 8px; }
        .cmt-input-bar { display: flex; gap: 5px; }
        .cmt-input-bar input { flex-grow: 1; background: transparent; border: none; border-bottom: 1px solid #262626; color: white; font-size: 0.85rem; outline: none; }
        .cmt-input-bar button { background: none; border: none; color: #0095f6; font-weight: 600; cursor: pointer; }

        .modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        .modal-content { max-width: 85%; max-height: 85%; object-fit: contain; border-radius: 4px; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; font-weight: bold; cursor: pointer; }

        /* --- MENU OVERLAY FOR PRIVATE VAULT --- */
        .menu-overlay { display: none; position: fixed; z-index: 998; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .menu-layout { width: 90%; max-width: 850px; height: 85vh; background: #121212; border-radius: 8px; border: 1px solid #262626; display: flex; flex-direction: column; overflow: hidden; padding: 20px; box-sizing: border-box; }
        .menu-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 20px; }
        .menu-header h2 { margin: 0; color: #ff4757; display: flex; align-items: center; gap: 10px; }
        .private-upload-box { background: #000; border: 1px dashed #363636; padding: 15px; border-radius: 6px; margin-bottom: 20px; }

        @media (max-width: 768px) { .insta-controls-grid { grid-template-columns: 1fr; } .grid-gallery-container { grid-template-columns: repeat(3, 1fr); gap: 4px; } }
    </style>
</head>
<body>
    <div class="insta-wrapper" id="main_view_panel">
        <!-- PROFILE HEADER -->
        <div class="insta-profile-header">
            <div class="profile-avatar-circle"><div class="profile-avatar-inner">Z</div></div>
            <div class="profile-info-data">
                <div class="profile-top-line">
                    <h1>zerogram_static</h1>
                    <div style="margin-left: 20px; display: flex; gap: 10px;">
                        <button class="btn-secondary-insta" onclick="togglePrivateMenu(true)">🔒 Private Menu</button>
                    </div>
                </div>
                <div style="color:#dbdbdb; font-size: 0.95rem;"><span><strong>GitHub Pages</strong> Deployment Live</span></div>
            </div>
        </div>

        <!-- CONTROL CARDS -->
        <div class="insta-controls-grid">
            <div class="control-card-box">
                <h3>Share Public Post</h3>
                <form onsubmit="handleBatchUpload(event, false)">
                    <div class="form-group">
                        <label>Select Folder/Stream</label>
                        <select id="target_gallery_select"></select>
                    </div>
                    <div class="form-group">
                        <input type="file" id="insta_file_input" accept="image/*,video/*" multiple required>
                    </div>
                    <button type="submit" class="btn-insta">Upload to Public Grid</button>
                </form>
                <div class="progress-container" id="p_container">
                    <div class="progress-bar-fill" id="p_fill"></div>
                    <div class="progress-text" id="p_text">0%</div>
                </div>
            </div>

            <div class="control-card-box">
                <h3>Manage Layout Folders</h3>
                <div class="form-group">
                    <input type="text" id="new_folder_input" placeholder="New folder name...">
                </div>
                <button type="button" class="btn-insta" onclick="createNewFolder()">Create Folder</button>
                <button type="button" class="btn-insta btn-danger" onclick="wipeLocalDatabase()">Wipe Local Database</button>
            </div>
        </div>

        <!-- STREAM TABS -->
        <div class="insta-feed-tabs" id="folder_tabs_bar"></div>

        <!-- FEED GRID -->
        <div class="grid-gallery-container" id="feed_grid_display"></div>
    </div>

    <!-- PRIVATE VAULT MENU OVERLAY -->
    <div id="privateMenuOverlay" class="menu-overlay">
        <div class="menu-layout">
            <div class="menu-header">
                <h2>🔒 Private Vault Menu</h2>
                <button class="btn-secondary-insta" onclick="togglePrivateMenu(false)">Back to Public</button>
            </div>
            
            <!-- Private Upload Sub-Engine -->
            <div class="private-upload-box">
                <h4 style="margin-top:0; color:#ff8da1; margin-bottom:10px;">Upload Directly to Private Menu (Same Telegram Channel)</h4>
                <form onsubmit="handleBatchUpload(event, true)" style="display:flex; gap:15px; flex-wrap:wrap; align-items:center;">
                    <input type="file" id="private_file_input" accept="image/*,video/*" multiple required style="background:#121212; padding:6px; border:1px solid #262626; color:white; border-radius:4px;">
                    <button type="submit" class="btn-insta" style="width:auto; padding:8px 20px; background-color:#ff4757;">Save Privately</button>
                </form>
                <div class="progress-container" id="p_container_private">
                    <div class="progress-bar-fill" id="p_fill_private"></div>
                    <div class="progress-text" id="p_text_private">0%</div>
                </div>
            </div>

            <!-- Private Photos Display Grid -->
            <div style="flex-grow:1; overflow-y:auto;">
                <div class="grid-gallery-container" id="private_grid_display"></div>
            </div>
        </div>
    </div>

    <!-- PHOTO ZOOM VISUAL MODAL LAYER -->
    <div id="photoModal" class="modal" onclick="closeView()">
        <span class="close-btn" onclick="closeView()">&times;</span>
        <img class="modal-content" id="fullImage" style="display:none;" onclick="event.stopPropagation()">
        <video class="modal-content" id="fullVideo" controls style="display:none;" onclick="event.stopPropagation()"></video>
    </div>

    <script>
        const BOT_TOKEN = "8877412628:AAHeZgC78XtddVqrg-Z75401IUCVRnQgH4c";
        const CHANNEL_ID = "-1004438175078";

        let store = JSON.parse(localStorage.getItem('zerogram_db')) || {
            folders: ["Main Gallery", "Samsung", "System_E"],
            activeFolder: "Main Gallery",
            items: []
        };

        function saveToStorage() {
            localStorage.setItem('zerogram_db', JSON.stringify(store));
            renderUI();
        }

        function renderUI() {
            // Render Folders Dropdown
            const tabsBar = document.getElementById("folder_tabs_bar");
            const selectDropdown = document.getElementById("target_gallery_select");
            tabsBar.innerHTML = "";
            selectDropdown.innerHTML = "";

            store.folders.forEach(folder => {
                const isActive = folder === store.activeFolder;
                tabsBar.innerHTML += `<button class="tab-btn-insta ${isActive ? 'active' : ''}" onclick="switchFolder('${folder}')">• ${folder.toUpperCase()}</button>`;
                selectDropdown.innerHTML += `<option value="${folder}" ${folder === store.activeFolder ? 'selected' : ''}>${folder}</option>`;
            });

            // 1. Render Public Feed Grid
            const publicGrid = document.getElementById("feed_grid_display");
            publicGrid.innerHTML = "";
            const activePublicItems = store.items.filter(item => item.folder === store.activeFolder && !item.isPrivate);

            if (activePublicItems.length === 0) {
                publicGrid.innerHTML = `<div style="grid-column: 1 / span 3; text-align:center; padding:40px; color:#8e8e8e;">No Public Posts Yet.</div>`;
            } else {
                activePublicItems.forEach(item => { publicGrid.innerHTML += generateCardHTML(item); });
            }

            // 2. Render Private Menu Grid
            const privateGrid = document.getElementById("private_grid_display");
            privateGrid.innerHTML = "";
            const privateItems = store.items.filter(item => item.isPrivate);

            if (privateItems.length === 0) {
                privateGrid.innerHTML = `<div style="grid-column: 1 / span 3; text-align:center; padding:40px; color:#8e8e8e;">No Private Hidden Posts Yet.</div>`;
            } else {
                privateItems.forEach(item => { privateGrid.innerHTML += generateCardHTML(item); });
            }
        }

        function generateCardHTML(item) {
            const isVideo = item.url.toLowerCase().match(/\.(mp4|webm|mov|mkv|ogg)/) || item.isVideo;
            let mediaTag = isVideo ? `<video src="${item.url}" muted loop playsinline></video>` : `<img src="${item.url}">`;
            let commentsHTML = (item.comments || []).map(c => `<div style="margin-bottom:4px;"><strong>@user:</strong> ${c}</div>`).join('');

            return `
                <div class="grid-item-card">
                    <button class="close-icon" onclick="deleteItem(event, '${item.id}')">&times;</button>
                    <div class="grid-item-box" onpointerdown="openView('${item.url}', ${isVideo})">${mediaTag}</div>
                    <div class="grid-item-footer">
                        <div class="comments-tray">${commentsHTML}</div>
                        <div class="cmt-input-bar">
                            <input type="text" placeholder="Add a comment..." id="input-${item.id}">
                            <button onclick="addComment('${item.id}')">Post</button>
                        </div>
                    </div>
                </div>`;
        }

        function togglePrivateMenu(show) {
            document.getElementById("privateMenuOverlay").style.display = show ? "flex" : "none";
        }

        function openView(url, isVideo) {
            const modal = document.getElementById("photoModal");
            const imgModal = document.getElementById("fullImage");
            const videoModal = document.getElementById("fullVideo");
            if (isVideo) {
                imgModal.style.display = "none"; videoModal.style.display = "block"; videoModal.src = url; videoModal.play();
            } else {
                videoModal.style.display = "none"; videoModal.pause(); imgModal.style.display = "block"; imgModal.src = url;
            }
            modal.style.display = "flex";
        }

        function closeView() {
            document.getElementById("fullVideo").pause();
            document.getElementById("photoModal").style.display = "none";
        }

        function switchFolder(folderName) {
            store.activeFolder = folderName;
            saveToStorage();
        }

        function createNewFolder() {
            const input = document.getElementById("new_folder_input");
            const name = input.value.trim();
            if (name && !store.folders.includes(name)) {
                store.folders.push(name); store.activeFolder = name; input.value = ""; saveToStorage();
            }
        }

        // CONTROL DUAL PIPELINE BATCH UPLOAD (PUBLIC & PRIVATE)
        async function handleBatchUpload(event, isPrivateAction) {
            event.preventDefault();
            const fileInput = document.getElementById(isPrivateAction ? "private_file_input" : "insta_file_input");
            const selectedFolder = isPrivateAction ? "Private Vault" : document.getElementById("target_gallery_select").value;
            if (!fileInput.files.length) return;

            const files = Array.from(fileInput.files);
            const total = files.length;
            
            const pFill = document.getElementById(isPrivateAction ? "p_fill_private" : "p_fill");
            const pText = document.getElementById(isPrivateAction ? "p_text_private" : "p_text");
            document.getElementById(isPrivateAction ? "p_container_private" : "p_container").style.display = "block";

            for (let i = 0; i < total; i++) {
                const file = files[i];
                pText.innerText = `Syncing ${i + 1}/${total} (${file.name})`;
                try {
                    const directUrl = await uploadToTelegram(file, (percent) => {
                        let overall = Math.round(((i / total) * 100) + (percent / total));
                        pFill.style.width = overall + "%";
                    });

                    if (directUrl) {
                        store.items.unshift({
                            id: 'item_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                            folder: selectedFolder,
                            url: directUrl,
                            isVideo: file.type.startsWith('video/'),
                            isPrivate: isPrivateAction, // FLAG THAT BLOCKS THE FILE FROM PUBLIC GRID
                            comments: []
                        });
                    }
                } catch (err) {
                    alert(`Upload Interrupted: ${file.name}`);
                }
            }
            document.getElementById(isPrivateAction ? "p_container_private" : "p_container").style.display = "none";
            fileInput.value = "";
            saveToStorage();
        }

        function uploadToTelegram(file, progressCallback) {
            return new Promise((resolve, reject) => {
                const isVideo = file.type.startsWith('video/');
                const method = isVideo ? "sendVideo" : "sendPhoto";
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/${method}`;

                const xhr = new XMLHttpRequest();
                const formData = new FormData();
                formData.append("chat_id", CHANNEL_ID);
                formData.append(isVideo ? "video" : "photo", file);

                xhr.upload.addEventListener("progress", (e) => {
                    if (e.lengthComputable) progressCallback(Math.round((e.loaded / e.total) * 100));
                });

                xhr.onreadystatechange = () => {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            const res = JSON.parse(xhr.responseText);
                            if (res.ok) {
                                const fileId = isVideo ? res.result.video.file_id : res.result.photo[res.result.photo.length - 1].file_id;
                                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`)
                                    .then(r => r.json())
                                    .then(fileInfo => {
                                        if (fileInfo.ok) resolve(`https://api.telegram.org/file/bot${BOT_TOKEN}/${fileInfo.result.file_path}`);
                                        else resolve(null);
                                    }).catch(() => resolve(null));
                            } else { resolve(null); }
                        } else { reject(xhr.statusText); }
                    }
                };
                xhr.open("POST", url, true); xhr.send(formData);
            });
        }

        function deleteItem(event, id) {
            event.stopPropagation();
            if (confirm("Delete this file permanently from website layout?")) {
                store.items = store.items.filter(item => item.id !== id);
                saveToStorage();
            }
        }

        function addComment(id) {
            const input = document.getElementById(`input-${id}`);
            const text = input.value.trim();
            if (text) {
                const item = store.items.find(i => i.id === id);
                if (item) { item.comments.push(text); input.value = ""; saveToStorage(); }
            }
        }

        function wipeLocalDatabase() {
            if (confirm("Reset completely? Cloud will be untouched.")) {
                localStorage.removeItem('zerogram_db');
                store = { folders: ["Main Gallery", "Samsung", "System_E"], activeFolder: "Main Gallery", items: [] };
                renderUI();
            }
        }

        renderUI();
    </script>
</body>
</html>
