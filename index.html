<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerogram Feed</title>
    <style>
        body { font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background-color: #000000; color: #f5f5f5; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .insta-wrapper { max-width: 600px; width: 100%; padding: 30px 15px; box-sizing: border-box; }
        .insta-profile-header { display: flex; align-items: center; gap: 25px; padding-bottom: 30px; border-bottom: 1px solid #262626; margin-bottom: 20px; }
        .profile-avatar-circle { width: 80px; height: 80px; background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7); border-radius: 50%; padding: 3px; display: flex; align-items: center; justify-content: center; }
        .profile-avatar-inner { width: 100%; height: 100%; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; color: #ff8da1; }
        .profile-info-data { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        .profile-top-line { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .profile-top-line h1 { font-size: 1.4rem; font-weight: 300; margin: 0; color: #ffffff; }
        
        .insta-controls-grid { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .control-card-box { background: #121212; border: 1px solid #262626; border-radius: 8px; padding: 20px; box-sizing: border-box; }
        .control-card-box h3 { margin-top: 0; font-size: 0.9rem; color: #8e8e8e; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #262626; padding-bottom: 8px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .form-group label { font-size: 0.85rem; color: #a8a8a8; font-weight: 600; }
        .form-group input, .form-group select { background: #000; border: 1px solid #363636; padding: 9px; color: white; border-radius: 4px; font-size: 0.9rem; outline: none; width: 100%; box-sizing: border-box; }
        
        .btn-insta { background-color: #0095f6; color: white; border: none; padding: 9px 16px; font-size: 0.9rem; font-weight: 600; border-radius: 4px; cursor: pointer; text-align: center; display: inline-block; text-decoration: none; width: 100%; box-sizing: border-box; }
        .btn-insta:hover { background-color: #1877f2; }
        .btn-secondary-insta { background-color: #121212; color: #fff; border: 1px solid #363636; padding: 8px 14px; font-weight: 600; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.85rem; }
        .btn-secondary-insta:hover { background-color: #262626; }
        .btn-danger { background-color: #311111; color: #ff4757; border: 1px solid #521919; margin-top: 10px; width: 100%; }

        .progress-container { display: none; margin-top: 15px; background: #262626; border-radius: 4px; overflow: hidden; position: relative; height: 20px; }
        .progress-bar-fill { background: linear-gradient(45deg, #0095f6, #00a8ff); width: 0%; height: 100%; }
        .progress-text { position: absolute; top: 0; left: 50%; transform: translateX(-50%); font-size: 0.75rem; font-weight: bold; color: #fff; line-height: 20px; }

        .insta-feed-tabs { display: flex; justify-content: center; gap: 20px; border-top: 1px solid #262626; margin-bottom: 25px; padding-top: 10px; flex-wrap: wrap; }
        .tab-btn-insta { background: none; border: none; color: #8e8e8e; padding: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .tab-btn-insta.active { color: #ffffff; border-bottom: 2px solid #ffffff; }

        .long-gallery-container { display: flex; flex-direction: column; gap: 35px; width: 100%; }
        .grid-item-card { display: flex; flex-direction: column; background: #000000; border: 1px solid #262626; border-radius: 8px; overflow: hidden; position: relative; width: 100%; }
        
        /* 👉 SCROLL OVERLAY CONFIGURATION */
        .grid-item-box { position: relative; width: 100%; background-color: #0a0a0f; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; touch-action: pan-y; }
        .grid-item-box img, .grid-item-box video { width: 100%; height: auto; max-height: 75vh; object-fit: contain; pointer-events: none; }
        
        .close-icon { position: absolute; top: 12px; right: 12px; background: rgba(0, 0, 0, 0.7); color: white; border: 1px solid #363636; border-radius: 50%; width: 32px; height: 32px; font-weight: bold; cursor: pointer; z-index: 20; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
        
        .grid-item-footer { padding: 14px; background: #000000; border-top: 1px solid #1c1c1c; }
        .stats-bar { font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; color: #f5f5f5; display: flex; gap: 15px; }
        .view-count-tag { color: #0095f6; display: flex; align-items: center; gap: 4px; }
        
        .comments-tray { max-height: 80px; overflow-y: auto; font-size: 0.85rem; color: #c7c7c7; margin-bottom: 12px; border-bottom: 1px solid #121212; padding-bottom: 5px; }
        .cmt-input-bar { display: flex; gap: 5px; }
        .cmt-input-bar input { flex-grow: 1; background: transparent; border: none; border-bottom: 1px solid #262626; color: white; font-size: 0.85rem; outline: none; padding: 5px 0; }
        .cmt-input-bar button { background: none; border: none; color: #0095f6; font-weight: 600; cursor: pointer; }

        .modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.98); align-items: center; justify-content: center; }
        .modal-content { max-width: 95%; max-height: 85%; object-fit: contain; border-radius: 6px; }
        .close-btn { position: absolute; top: 20px; right: 25px; color: #ffffff; font-size: 45px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="insta-wrapper">
        <div class="insta-profile-header">
            <div class="profile-avatar-circle"><div class="profile-avatar-inner">Z</div></div>
            <div class="profile-info-data">
                <div class="profile-top-line">
                    <h1>zerogram_public</h1>
                    <a href="private.html" class="btn-secondary-insta">🔒 Go to Private Vault</a>
                </div>
                <div style="color:#dbdbdb; font-size: 0.85rem; margin-top: 5px;"><span><strong>Long View Scroll</strong> Enabled</span></div>
            </div>
        </div>

        <div class="insta-controls-grid">
            <div class="control-card-box">
                <h3>Share Public Post</h3>
                <form onsubmit="handleBatchUpload(event)">
                    <div class="form-group">
                        <label>Select Folder</label>
                        <select id="target_gallery_select"></select>
                    </div>
                    <div class="form-group">
                        <input type="file" id="insta_file_input" accept="image/*,video/*" multiple required>
                    </div>
                    <button type="submit" class="btn-insta">Upload to Feed</button>
                </form>
                <div class="progress-container" id="p_container">
                    <div class="progress-bar-fill" id="p_fill"></div>
                    <div class="progress-text" id="p_text">0%</div>
                </div>
            </div>

            <div class="control-card-box">
                <h3>Settings</h3>
                <input type="text" id="new_folder_input" placeholder="New folder name..." style="background: #000; border: 1px solid #363636; padding: 9px; color: white; border-radius: 4px; font-size: 0.9rem; width: 100%; box-sizing: border-box; margin-bottom: 10px;">
                <button type="button" class="btn-insta" onclick="createNewFolder()" style="margin-bottom:5px;">Create Folder</button>
                <button type="button" class="btn-insta btn-danger" onclick="wipeLocalDatabase()">Wipe Local Database</button>
            </div>
        </div>

        <div class="insta-feed-tabs" id="folder_tabs_bar"></div>

        <div class="long-gallery-container" id="feed_grid_display"></div>
    </div>

    <div id="photoModal" class="modal" onclick="closeView()">
        <span class="close-btn" onclick="closeView()">&times;</span>
        <img class="modal-content" id="fullImage" style="display:none;" onclick="event.stopPropagation()">
        <video class="modal-content" id="fullVideo" controls style="display:none;" onclick="event.stopPropagation()"></video>
    </div>

    <script>
        const BOT_TOKEN = "8877412628:AAHeZgC78XtddVqrg-Z75401IUCVRnQgH4c";
        const CHANNEL_ID = "-1004438175078";

        let store = JSON.parse(localStorage.getItem('zerogram_db')) || {
            folders: ["Main Gallery", "Samsung", "System_E"],
            activeFolder: "Main Gallery",
            items: []
        };

        function saveToStorage() {
            localStorage.setItem('zerogram_db', JSON.stringify(store));
            renderUI();
        }

        function renderUI() {
            const tabsBar = document.getElementById("folder_tabs_bar");
            const selectDropdown = document.getElementById("target_gallery_select");
            tabsBar.innerHTML = "";
            selectDropdown.innerHTML = "";

            store.folders.forEach(folder => {
                const isActive = folder === store.activeFolder;
                tabsBar.innerHTML += `<button class="tab-btn-insta ${isActive ? 'active' : ''}" onclick="switchFolder('${folder}')">• ${folder.toUpperCase()}</button>`;
                selectDropdown.innerHTML += `<option value="${folder}" ${folder === store.activeFolder ? 'selected' : ''}>${folder}</option>`;
            });

            const grid = document.getElementById("feed_grid_display");
            grid.innerHTML = "";
            
            const activeItems = store.items.filter(item => item.folder === store.activeFolder && !item.isPrivate);

            if (activeItems.length === 0) {
                grid.innerHTML = `<div style="text-align:center; padding:40px; color:#8e8e8e;">No Public Posts Yet.</div>`;
                return;
            }

            activeItems.forEach(item => {
                const isVideo = item.url.toLowerCase().match(/\.(mp4|webm|mov|mkv|ogg)/) || item.isVideo;
                let mediaTag = isVideo ? `<video src="${item.url}" muted loop playsinline></video>` : `<img src="${item.url}">`;
                let commentsHTML = (item.comments || []).map(c => `<div style="margin-bottom:4px;"><strong>@user:</strong> ${c}</div>`).join('');
                let totalViews = item.views || 0;

                // 👉 FIXED TOUCH LOGIC: Changed from onpointerdown to onclick to enable native fluid scrolling
                grid.innerHTML += `
                    <div class="grid-item-card">
                        <button class="close-icon" onclick="deleteItem(event, '${item.id}')">&times;</button>
                        <div class="grid-item-box" onclick="registerViewAndOpen('${item.id}', '${item.url}', ${isVideo})">${mediaTag}</div>
                        <div class="grid-item-footer">
                            <div class="stats-bar">
                                <span class="view-count-tag">👁️ ${totalViews} views</span>
                            </div>
                            <div class="comments-tray">${commentsHTML}</div>
                            <div class="cmt-input-bar">
                                <input type="text" placeholder="Add a comment..." id="input-${item.id}">
                                <button onclick="addComment('${item.id}')">Post</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function registerViewAndOpen(id, url, isVideo) {
            const item = store.items.find(i => i.id === id);
            if (item) {
                item.views = (item.views || 0) + 1;
                localStorage.setItem('zerogram_db', JSON.stringify(store));
                renderUI();
            }
            openView(url, isVideo);
        }

        function openView(url, isVideo) {
            const modal = document.getElementById("photoModal");
            const imgModal = document.getElementById("fullImage");
            const videoModal = document.getElementById("fullVideo");
            if (isVideo) {
                imgModal.style.display = "none"; videoModal.style.display = "block"; videoModal.src = url; videoModal.play();
            } else {
                videoModal.style.display = "none"; videoModal.pause(); imgModal.style.display = "block"; imgModal.src = url;
            }
            modal.style.display = "flex";
        }

        function closeView() {
            document.getElementById("fullVideo").pause();
            document.getElementById("photoModal").style.display = "none";
        }

        function switchFolder(folderName) {
            store.activeFolder = folderName;
            saveToStorage();
        }

        function createNewFolder() {
            const input = document.getElementById("new_folder_input");
            const name = input.value.trim();
            if (name && !store.folders.includes(name)) {
                store.folders.push(name); store.activeFolder = name; input.value = ""; saveToStorage();
            }
        }

        async function handleBatchUpload(event) {
            event.preventDefault();
            const fileInput = document.getElementById("insta_file_input");
            const selectedFolder = document.getElementById("target_gallery_select").value;
            if (!fileInput.files.length) return;

            const files = Array.from(fileInput.files);
            const total = files.length;
            const pContainer = document.getElementById("p_container");
            const pFill = document.getElementById("p_fill");
            const pText = document.getElementById("p_text");

            pContainer.style.display = "block";

            for (let i = 0; i < total; i++) {
                const file = files[i];
                pText.innerText = `Uploading ${i + 1}/${total}`;
                try {
                    const directUrl = await uploadToTelegram(file, (percent) => {
                        let overall = Math.round(((i / total) * 100) + (percent / total));
                        pFill.style.width = overall + "%";
                    });

                    if (directUrl) {
                        store.items.unshift({
                            id: 'item_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                            folder: selectedFolder,
                            url: directUrl,
                            isVideo: file.type.startsWith('video/'),
                            isPrivate: false,
                            views: 0,
                            comments: []
                        });
                    }
                } catch (err) {
                    alert(`Upload failed`);
                }
            }
            pContainer.style.display = "none";
            fileInput.value = "";
            saveToStorage();
        }

        function uploadToTelegram(file, progressCallback) {
            return new Promise((resolve, reject) => {
                const isVideo = file.type.startsWith('video/');
                const method = isVideo ? "sendVideo" : "sendPhoto";
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/${method}`;

                const xhr = new XMLHttpRequest();
                const formData = new FormData();
                formData.append("chat_id", CHANNEL_ID);
                formData.append(isVideo ? "video" : "photo", file);

                xhr.upload.addEventListener("progress", (e) => {
                    if (e.lengthComputable) progressCallback(Math.round((e.loaded / e.total) * 100));
                });

                xhr.onreadystatechange = () => {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            const res = JSON.parse(xhr.responseText);
                            if (res.ok) {
                                const fileId = isVideo ? res.result.video.file_id : res.result.photo[res.result.photo.length - 1].file_id;
                                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`)
                                    .then(r => r.json())
                                    .then(fileInfo => {
                                        if (fileInfo.ok) resolve(`https://api.telegram.org/file/bot${BOT_TOKEN}/${fileInfo.result.file_path}`);
                                        else resolve(null);
                                    }).catch(() => resolve(null));
                            } else { resolve(null); }
                        } else { reject(xhr.statusText); }
                    }
                };
                xhr.open("POST", url, true); xhr.send(formData);
            });
        }

        function deleteItem(event, id) {
            event.stopPropagation();
            if (confirm("Delete this post?")) {
                store.items = store.items.filter(item => item.id !== id);
                saveToStorage();
            }
        }

        function addComment(id) {
            const input = document.getElementById(`input-${id}`);
            const text = input.value.trim();
            if (text) {
                const item = store.items.find(i => i.id === id);
                if (item) {
                    if (!item.comments) item.comments = [];
                    item.comments.push(text); input.value = ""; saveToStorage();
                }
            }
        }

        function wipeLocalDatabase() {
            if (confirm("Wipe all local mappings?")) {
                localStorage.removeItem('zerogram_db');
                store = { folders: ["Main Gallery", "Samsung", "System_E"], activeFolder: "Main Gallery", items: [] };
                renderUI();
            }
        }

        renderUI();
    </script>
</body>
</html>
